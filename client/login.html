<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EpicMoney – Войти</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-dark); }
    .auth-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; }
    .auth-card h1 { text-align: center; color: var(--accent); font-size: 1.8rem; margin-bottom: 8px; }
    .auth-card p.subtitle { text-align: center; color: var(--text-muted); margin-bottom: 28px; font-size: 0.9rem; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 12px 14px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; box-sizing: border-box; transition: border-color 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .btn-full { width: 100%; padding: 13px; font-size: 1rem; }
    .auth-footer { text-align: center; margin-top: 20px; color: var(--text-muted); font-size: 0.9rem; }
    .auth-footer a { color: var(--accent); text-decoration: none; }
    .error-msg { background: rgba(255,80,80,0.15); border: 1px solid #ff5050; border-radius: 8px; padding: 10px 14px; color: #ff8080; font-size: 0.9rem; margin-bottom: 16px; display: none; }
    .logo { text-align: center; font-size: 2.4rem; margin-bottom: 16px; }
    .demo-hint { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 12px; background: rgba(255,215,0,0.06); border: 1px solid rgba(255,215,0,0.15); border-radius: 8px; padding: 10px; }
    .demo-hint strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="logo">🎰</div>
    <h1>EpicMoney</h1>
    <p class="subtitle">Войдите в свой аккаунт</p>
    <div id="errorMsg" class="error-msg"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Имя пользователя</label>
        <input type="text" id="username" placeholder="Введите ник" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-accent btn-full" id="loginBtn">Войти</button>
    </form>
    <div class="demo-hint">
      Демо-аккаунт: <strong>demo</strong> / <strong>demo123</strong>
    </div>
    <div class="auth-footer">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
  </div>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('em_current_uid')) window.location.href = 'index.html';

    // WARNING: This is a weak hash for local demo purposes only.
    // Use a proper server-side solution with bcrypt for real authentication.
    function hashPass(str) {
      let h = 5381;
      for (let i = 0; i < str.length; i++) h = (((h << 5) + h) ^ str.charCodeAt(i)) >>> 0;
      return h.toString(16);
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
    }

    // Ensure demo account exists
    (function ensureDemo() {
      const users = JSON.parse(localStorage.getItem('em_users') || '[]');
      if (!users.find(u => u.username === 'demo')) {
        users.push({
          id: 'demo-user',
          username: 'demo',
          passwordHash: hashPass('demo123'),
          coins: 1000,
          gamesPlayed: 0,
          gamesWon: 0,
          totalWinnings: 0,
          referralCode: 'DEMO0000',
          createdAt: Date.now()
        });
        localStorage.setItem('em_users', JSON.stringify(users));
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const users = JSON.parse(localStorage.getItem('em_users') || '[]');
      const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());

      if (!user || user.passwordHash !== hashPass(password)) {
        errEl.textContent = 'Неверный логин или пароль';
        errEl.style.display = 'block';
        return;
      }

      localStorage.setItem('em_current_uid', user.id);
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
